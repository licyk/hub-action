name: Trigger aria2-next package update

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:
    inputs:
      release:
        description: "aria2-next release tag to package, or latest"
        required: false
        default: "latest"
      publish:
        description: "Publish wheels from aria2-next-bin"
        required: false
        type: boolean
        default: true
      force:
        description: "Trigger even if PyPI already has this version"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  trigger-aria2-next:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install packaging

      - name: Check upstream release, assets, and PyPI
        id: check
        env:
          RELEASE: ${{ github.event.inputs.release || 'latest' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/check_aria2_next_package_update.py

      - name: Trigger aria2-next-bin build and publish
        if: steps.check.outputs.should_trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.ARIA2_NEXT_BIN_TOKEN }}
          PUBLISH: ${{ github.event.inputs.publish || 'true' }}
        run: |
          gh workflow run build-wheels.yml \
            --repo licyk/aria2-next-bin \
            --ref main \
            -f release="${{ steps.check.outputs.release }}" \
            -f publish="$PUBLISH" \
            -f repository_url=""

      - name: Skip summary
        if: steps.check.outputs.should_trigger != 'true'
        run: |
          echo "Skip: ${{ steps.check.outputs.reason }}"
          echo "Release: ${{ steps.check.outputs.release }}"
          echo "Missing assets: ${{ steps.check.outputs.missing_assets }}"
          echo "Missing wheels: ${{ steps.check.outputs.missing_wheels }}"
