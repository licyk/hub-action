name: List HuggingFace Repo

on: 
  schedule:
  # * 是一个特殊字符在 YAML 中，所以你需要引用这个字符串
  # UTC 17:00 -> CST (China) 1:00, see https://datetime360.com/cn/utc-cst-china-time/
  - cron: '0 16 * * *' # 每日24点进行同步
  # push:
  # delete:
  # create:
  workflow_dispatch:


jobs:
  List-HuggingFace-Repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8

      - name: Config HuggingFace Python Library
        shell: bash
        env:
          UV_SYSTEM_PYTHON: 1
        run: |
          uv pip install huggingface_hub

      - name: List files in the repository
        run: |
          cd "${{ github.workspace }}"
          ls "${{ github.workspace }}"

      - name: List files in HuggingFace repository
        shell: bash
        run: |
          python "${{ github.workspace }}/scripts/list_hf_repo.py"
