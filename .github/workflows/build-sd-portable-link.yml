name: Build SD Portable Download Link

on: 
  # schedule:
  # - cron: '0 22 * * *'
  # push:
  # delete:
  # create:
  workflow_dispatch:

jobs:
  Build-SD-Portable-Download-Link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Config HuggingFace Python Library
        shell: bash
        env:
          UV_SYSTEM_PYTHON: 1
        run: |
          uv pip install huggingface_hub modelscope requests

      - name: List files in the repository
        run: |
          echo "inputs.pytorch_version: ${{ inputs.pytorch_version }}"
          ls "${{ github.workspace }}"

      - name: Build SD Portable Download Link
        shell: bash
        env:
          ROOT_PATH: ${{ github.workspace }}/artifact/
          REPO_ID: licyks/sd-webui-all-in-one
          REPO_TYPE: model
        run: |
          python "${{ github.workspace }}/scripts/build_sd_portable_download_link.py"

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: link_file
          path: ${{ github.workspace }}/artifact/

      - name: Configure Git
        env:
          DEPLOY_PRI: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
          GIT_USERNAME: ${{ github.repository_owner }}
          GIT_EMAIL: ${{ github.repository_owner }}@user.github.com
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          mkdir -p ~/.ssh/
          echo "$DEPLOY_PRI" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global user.name "$GIT_USERNAME"
          git config --global user.email "$GIT_EMAIL"

      - name: Commit Repo
        env:
          GIT_URL: 'git@github.com:licyk/t.git'
        run: |
          git clone "$GIT_URL" "${{ github.workspace }}/repo"
          git -C "${{ github.workspace }}/repo" checkout gh-pages
          mkdir -p "${{ github.workspace }}/repo/sd_portable"
          rm -rf "${{ github.workspace }}/repo/sd_portable/stable"
          rm -rf "${{ github.workspace }}/repo/sd_portable/nightly"
          cp -rf "${{ github.workspace }}/artifact/"* "${{ github.workspace }}/repo/sd_portable"
          cd "${{ github.workspace }}/repo"
          git add -A || true
          git commit -m "Build SD Portable Download Link. Time: $(date +'%Y-%m-%d %H:%M:%S')" || true

      - name: Push Repo
        run: |
          cd "${{ github.workspace }}/repo"
          git push origin HEAD:gh-pages || true
